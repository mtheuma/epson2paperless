# epson2paperless — sample compose file.
# Edit PRINTER_IP and the output volume, then: docker compose up -d

services:
  epson2paperless:
    image: ghcr.io/mtheuma/epson2paperless:latest
    restart: unless-stopped
    network_mode: host
    init: true
    environment:
      PRINTER_IP: 192.0.2.58
      SCAN_DEST_NAME: Paperless
      LOG_LEVEL: info
      # OUTPUT_DIR: /output       # image default; override only if you change the volume target path below
      # PREVIEW_ACTION: reject    # default; override to jpg|pdf to rewrite panel's "Preview on Computer"
      # TEMP_DIR: /tmp            # default; override if /tmp is tmpfs-constrained
      # SHUTDOWN_TIMEOUT_MS: 30000
      #
      # Paperless-ngx direct upload (optional — see README § Direct upload).
      # PAPERLESS_URL: http://paperless:8000
      # PAPERLESS_TOKEN: <your-api-token>
      # PAPERLESS_TOKEN_FILE: /run/secrets/paperless_token   # alternative to _TOKEN; takes precedence if both set
      # PAPERLESS_DELETE_AFTER_UPLOAD: "true"                # default; set "false" to keep local file after upload
    volumes:
      - ./output:/output
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
