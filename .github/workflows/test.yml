name: test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "npm"

      - name: Install dependencies
        # Using `npm install` rather than `npm ci` because the lockfile is
        # generated on Windows (primary dev OS) and doesn't include some
        # Linux-only optional native deps (@emnapi/*). `npm install` tolerates
        # this cross-OS drift; `npm ci` refuses.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run test suite
        run: npm test
